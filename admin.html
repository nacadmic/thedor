<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>관리자 | theodore.</title>
  <link rel="stylesheet" href="/style.css?v=2">
  <style>
    :root { --admin-bg: #f8f7f5; --admin-card: #fff; --admin-border: #e8e6e3; --admin-text: #2c2c2c; --admin-muted: #6b6b6b; --admin-accent: #833ab4; --admin-accent2: #e1306c; }
    body { background: var(--admin-bg); font-family: 'Noto Sans KR', sans-serif; color: var(--admin-text); }
    .admin-wrap { max-width: 680px; margin: 0 auto; padding: 48px 24px; }
    .admin-section { background: var(--admin-card); border-radius: 16px; padding: 24px; margin-bottom: 20px; box-shadow: 0 2px 12px rgba(0,0,0,0.04); border: 1px solid var(--admin-border); }
    .admin-section h2 { font-size: 0.95rem; font-weight: 600; margin-bottom: 18px; color: var(--admin-text); letter-spacing: -0.02em; padding-bottom: 10px; border-bottom: 1px solid var(--admin-border); }
    .admin-field { margin-bottom: 18px; }
    .admin-field:last-child { margin-bottom: 0; }
    .admin-field label { display: block; font-size: 0.8rem; color: var(--admin-muted); margin-bottom: 6px; font-weight: 500; }
    .admin-field input[type="text"], .admin-field input[type="url"], .admin-field textarea { width: 100%; padding: 12px 14px; border: 1px solid var(--admin-border); border-radius: 10px; font-size: 0.95rem; background: #fafafa; transition: border-color 0.2s; }
    .admin-field input:focus, .admin-field textarea:focus { outline: none; border-color: var(--admin-accent); background: #fff; }
    .admin-field textarea { min-height: 120px; resize: vertical; }
    .admin-actions { display: flex; gap: 12px; margin-top: 28px; flex-wrap: wrap; }
    .btn { padding: 14px 28px; border: none; border-radius: 10px; font-size: 0.95rem; cursor: pointer; font-weight: 500; transition: opacity 0.2s; }
    .btn:hover { opacity: 0.9; }
    .btn-primary { background: linear-gradient(135deg, var(--admin-accent2), var(--admin-accent)); color: #fff; }
    .btn-secondary { background: var(--admin-card); color: var(--admin-text); border: 1px solid var(--admin-border); }
    .login-box { max-width: 380px; margin: 100px auto; padding: 40px; background: var(--admin-card); border-radius: 20px; box-shadow: 0 16px 56px rgba(0,0,0,0.06); border: 1px solid var(--admin-border); }
    .login-box h1 { font-size: 1.35rem; font-weight: 600; margin-bottom: 24px; letter-spacing: -0.02em; }
    .login-box input { width: 100%; padding: 14px; margin-bottom: 16px; border: 1px solid var(--admin-border); border-radius: 10px; font-size: 1rem; }
    .login-error { color: #c00; font-size: 0.9rem; margin-bottom: 12px; }
    .admin-status { font-size: 0.9rem; margin-bottom: 20px; min-height: 1.2em; }
    .admin-status.success { color: #0d7d2b; font-weight: 500; padding: 10px 14px; background: #e8f5e9; border-radius: 10px; display: inline-block; }
    .admin-status.error { color: #c00; }
    .btn-kakao { width: 100%; background: #FEE500; color: #191919; padding: 14px; }
    .btn-kakao:hover { background: #f0d900; }
    #adminView h1 { font-size: 1.5rem; font-weight: 600; margin-bottom: 28px; letter-spacing: -0.03em; }
    .gallery-upload-zone { border: 2px dashed var(--admin-border); border-radius: 16px; padding: 32px; text-align: center; background: #fafafa; cursor: pointer; transition: border-color 0.2s, background 0.2s; margin-bottom: 20px; }
    .gallery-upload-zone:hover, .gallery-upload-zone.dragover { border-color: var(--admin-accent); background: #f5f0fa; }
    .gallery-upload-zone p { margin: 0; color: var(--admin-muted); font-size: 0.9rem; }
    .gallery-upload-zone .zone-icon { font-size: 2rem; margin-bottom: 8px; opacity: 0.6; }
    .gallery-thumbs { display: grid; grid-template-columns: repeat(6, 1fr); gap: 10px; }
    .gallery-thumb { aspect-ratio: 1; border-radius: 10px; overflow: hidden; background: var(--admin-border); position: relative; cursor: pointer; border: 2px solid transparent; transition: border-color 0.2s; }
    .gallery-thumb:hover { border-color: var(--admin-accent); }
    .gallery-thumb img { width: 100%; height: 100%; object-fit: cover; display: block; }
    .gallery-thumb .thumb-placeholder { width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; color: var(--admin-muted); font-size: 1.2rem; }
    .gallery-thumb .thumb-num { position: absolute; bottom: 4px; right: 6px; background: rgba(0,0,0,0.5); color: #fff; font-size: 0.7rem; padding: 2px 6px; border-radius: 4px; }
    .gallery-thumb input[type="file"] { position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%; height: 100%; }
    input.gallery-url-hidden { position: absolute; left: -9999px; }
  </style>
</head>
<body>
  <div class="admin-wrap">
    <div id="loginView" class="login-box">
      <h1>관리자 로그인</h1>
      <p id="loginError" class="login-error" style="display:none;"></p>
      <div id="kakaoLoginWrap" style="display:none;">
        <button type="button" class="btn btn-kakao" id="kakaoLoginBtn">카카오로 로그인</button>
      </div>
      <p id="loginUnconfigured" class="login-error" style="display:none;">관리자 로그인이 설정되지 않았습니다.</p>
    </div>

    <div id="adminView" style="display:none;">
      <h1 style="margin-bottom:24px">콘텐츠 수정</h1>
      <p id="adminStatus" class="admin-status"></p>

      <section class="admin-section">
        <h2>공통</h2>
        <div class="admin-field">
          <label>사이트 타이틀 (브라우저 탭)</label>
          <input type="text" id="meta.siteTitle" data-key="meta.siteTitle">
        </div>
        <div class="admin-field">
          <label>인스타그램 URL</label>
          <input type="url" id="meta.instagramUrl" data-key="meta.instagramUrl">
        </div>
      </section>

      <section class="admin-section">
        <h2>메인 페이지</h2>
        <div class="admin-field">
          <label>로고 텍스트</label>
          <input type="text" id="home.logo" data-key="home.logo">
        </div>
        <div class="admin-field">
          <label>네비: Home</label>
          <input type="text" id="home.navHome" data-key="home.navHome">
        </div>
        <div class="admin-field">
          <label>네비: Identity</label>
          <input type="text" id="home.navIdentity" data-key="home.navIdentity">
        </div>
        <div class="admin-field">
          <label>네비: About</label>
          <input type="text" id="home.navAbout" data-key="home.navAbout">
        </div>
        <div class="admin-field">
          <label>모바일 메뉴: Contact</label>
          <input type="text" id="home.menuContact" data-key="home.menuContact">
        </div>
        <div class="admin-field">
          <label>히어로 타이틀</label>
          <input type="text" id="home.heroTitle" data-key="home.heroTitle">
        </div>
        <div class="admin-field">
          <label>히어로 설명</label>
          <input type="text" id="home.heroDesc" data-key="home.heroDesc">
        </div>
        <div class="admin-field">
          <label>Coming soon 문구</label>
          <input type="text" id="home.heroComing" data-key="home.heroComing">
        </div>
        <div class="admin-field">
          <label>갤러리 섹션 제목</label>
          <input type="text" id="home.galleryTitle" data-key="home.galleryTitle">
        </div>
        <div class="admin-field">
          <label>갤러리 이미지 대체 텍스트</label>
          <input type="text" id="home.galleryAlt" data-key="home.galleryAlt">
        </div>
        <div class="admin-field">
          <label>푸터 저작권</label>
          <input type="text" id="home.footerCopyright" data-key="home.footerCopyright">
        </div>
      </section>

      <section class="admin-section">
        <h2>갤러리 이미지 (1~24)</h2>
        <p class="admin-field" style="margin-bottom:12px;color:var(--admin-muted);font-size:0.85rem">아래 영역에 클릭하거나 이미지를 끌어다 놓으면 빈 슬롯부터 순서대로 채워집니다.</p>
        <div class="gallery-upload-zone" id="galleryUploadZone">
          <span class="zone-icon">📷</span>
          <p>클릭하거나 이미지를 끌어다 놓으세요</p>
        </div>
        <input type="file" id="galleryZoneFileInput" accept="image/*" multiple style="display:none">
        <div id="galleryThumbs" class="gallery-thumbs"></div>
      </section>

      <section class="admin-section">
        <h2>About 페이지</h2>
        <div class="admin-field">
          <label>페이지 제목</label>
          <input type="text" id="about.pageTitle" data-key="about.pageTitle">
        </div>
        <div class="admin-field">
          <label>본문 (한 문단, 줄바꿈은 그대로 표시됨)</label>
          <textarea id="about.body" data-key="about.body" style="min-height:160px"></textarea>
        </div>
        <div class="admin-field">
          <label>푸터 저작권</label>
          <input type="text" id="about.footerCopyright" data-key="about.footerCopyright">
        </div>
      </section>

      <div class="admin-actions">
        <button type="button" class="btn btn-primary" id="saveBtn">저장</button>
        <a href="/" class="btn btn-secondary">사이트 보기</a>
      </div>
    </div>
  </div>

  <script>
    const API = '';
    const TOKEN_KEY = 'admin_token';
    let publicConfig = { kakaoLogin: false, kakaoRestKey: '', redirectUri: '' };

    function getToken() { return sessionStorage.getItem(TOKEN_KEY); }
    function setToken(t) { if (t) sessionStorage.setItem(TOKEN_KEY, t); else sessionStorage.removeItem(TOKEN_KEY); }

    async function api(path, options = {}) {
      const url = (API || (location.origin + '/api')) + path;
      const headers = { ...options.headers };
      if (options.body && typeof options.body === 'object' && !(options.body instanceof FormData)) {
        headers['Content-Type'] = 'application/json';
        options.body = JSON.stringify(options.body);
      }
      const token = getToken();
      if (token) headers['Authorization'] = 'Bearer ' + token;
      const res = await fetch(url, { ...options, headers });
      const text = await res.text();
      let data;
      try { data = JSON.parse(text); } catch { data = text; }
      if (!res.ok) throw { status: res.status, data };
      return data;
    }

    function setByKey(obj, key, value) {
      const parts = key.split('.');
      let cur = obj;
      for (let i = 0; i < parts.length - 1; i++) {
        const p = parts[i];
        if (!cur[p]) cur[p] = {};
        cur = cur[p];
      }
      cur[parts[parts.length - 1]] = value;
    }
    function getByKey(obj, key) {
      return key.split('.').reduce((o, p) => o && o[p], obj);
    }

    // Public config (Kakao only)
    fetch((API || location.origin + '/api') + '/config')
      .then((r) => r.json())
      .then((c) => {
        publicConfig = c;
        if (c.kakaoLogin && c.kakaoRestKey && c.redirectUri) {
          document.getElementById('kakaoLoginWrap').style.display = 'block';
        } else {
          document.getElementById('loginUnconfigured').style.display = 'block';
        }
      })
      .catch(() => { document.getElementById('loginUnconfigured').style.display = 'block'; });

    document.getElementById('kakaoLoginBtn').addEventListener('click', () => {
      if (!publicConfig.kakaoRestKey || !publicConfig.redirectUri) return;
      const url = 'https://kauth.kakao.com/oauth/authorize?response_type=code&client_id=' +
        encodeURIComponent(publicConfig.kakaoRestKey) + '&redirect_uri=' +
        encodeURIComponent(publicConfig.redirectUri) + '&scope=account_email';
      location.href = url;
    });

    // Handle return from Kakao: ?code=... (redirect_uri must match what Kakao used)
    (async function tryKakaoCode() {
      const params = new URLSearchParams(location.search);
      const code = params.get('code');
      if (!code) return;
      const redirectUri = location.origin + (location.pathname || '/admin');
      try {
        const { token } = await api('/auth-kakao', { method: 'POST', body: { code, redirectUri } });
        setToken(token);
        history.replaceState(null, '', location.pathname || '/admin');
        document.getElementById('loginView').style.display = 'none';
        document.getElementById('adminView').style.display = 'block';
        loadContent();
      } catch (e) {
        let msg = e.data && e.data.error || '카카오 로그인 실패';
        if (e.data && (e.data.kakaoErrorCode || e.data.kakaoError)) msg += ' (카카오: ' + (e.data.kakaoErrorCode || '') + ' ' + (e.data.kakaoError || '') + ')';
        if (e.data && e.data.copyPaste) msg += ' → ' + e.data.copyPaste;
        document.getElementById('loginError').textContent = msg;
        document.getElementById('loginError').style.display = 'block';
        history.replaceState(null, '', location.pathname || '/admin');
      }
    })();

    let currentContent = null;

    async function loadContent() {
      try {
        currentContent = await api('/content');
        document.getElementById('adminStatus').textContent = '콘텐츠를 불러왔습니다.'; document.getElementById('adminStatus').className = 'admin-status';
        fillForm(currentContent);
      } catch (e) {
        document.getElementById('adminStatus').textContent = '콘텐츠 로드 실패: ' + (e.data && e.data.error || e.message); document.getElementById('adminStatus').className = 'admin-status error';
      }
    }

    function fillForm(data) {
      document.querySelectorAll('[data-key]').forEach(el => {
        const key = el.getAttribute('data-key');
        if (key && key.startsWith('home.galleryImages.')) return;
        let val = getByKey(data, key);
        if (key === 'about.body' && (val === undefined || val === null) && data.about) {
          const p = data.about;
          val = [p.paragraph1, p.paragraph2, p.paragraph3].filter(Boolean).join('\n\n');
        }
        if (val !== undefined && val !== null) {
          if (el.tagName === 'TEXTAREA') el.value = val;
          else el.value = val;
        }
      });
      const wrap = document.getElementById('galleryThumbs');
      wrap.innerHTML = '';
      const imgs = (data.home && data.home.galleryImages) || {};
      for (let i = 1; i <= 24; i++) {
        const url = imgs[String(i)] || '';
        const div = document.createElement('div');
        div.className = 'gallery-thumb';
        div.innerHTML = `
          <input type="text" class="gallery-url-hidden" id="home.galleryImages.${i}" data-key="home.galleryImages.${i}">
          <div class="thumb-placeholder">+</div>
          <span class="thumb-num">${i}</span>
          <input type="file" accept="image/*" data-slot="${i}">
        `;
        const urlInput = div.querySelector('input[data-key]');
        const placeholder = div.querySelector('.thumb-placeholder');
        if (urlInput) urlInput.value = url;
        if (url) {
          const img = document.createElement('img');
          img.alt = '';
          img.src = url;
          placeholder.replaceWith(img);
        }
        wrap.appendChild(div);
      }
      bindGalleryUpload();
    }

    function firstEmptySlot() {
      for (let i = 1; i <= 24; i++) {
        const el = document.querySelector(`input[data-key="home.galleryImages.${i}"]`);
        if (!el || !el.value || !el.value.trim()) return i;
      }
      return 25;
    }

    function setSlotPreview(slot, url) {
      const wrap = document.getElementById('galleryThumbs');
      const thumb = wrap && wrap.querySelector(`.gallery-thumb input[data-slot="${slot}"]`) && wrap.querySelector(`.gallery-thumb input[data-slot="${slot}"]`).closest('.gallery-thumb');
      if (!thumb) return;
      const urlInput = thumb.querySelector('input[data-key]');
      const placeholder = thumb.querySelector('.thumb-placeholder');
      let img = thumb.querySelector('img');
      if (urlInput) urlInput.value = url;
      if (placeholder) placeholder.remove();
      if (!img) {
        img = document.createElement('img');
        img.alt = '';
        thumb.insertBefore(img, thumb.querySelector('.thumb-num'));
      }
      img.src = url;
    }

    function bindGalleryUpload() {
      const zone = document.getElementById('galleryUploadZone');
      const zoneInput = document.getElementById('galleryZoneFileInput');
      if (!zone || !zoneInput) return;
      zone.onclick = () => zoneInput.click();
      zone.ondragover = (e) => { e.preventDefault(); zone.classList.add('dragover'); };
      zone.ondragleave = () => zone.classList.remove('dragover');
      zone.ondrop = (e) => {
        e.preventDefault();
        zone.classList.remove('dragover');
        if (e.dataTransfer.files.length) zoneInput.files = e.dataTransfer.files;
        zoneInput.dispatchEvent(new Event('change'));
      };
      zoneInput.onchange = async () => {
        const files = Array.from(zoneInput.files || []);
        zoneInput.value = '';
        let nextSlot = firstEmptySlot();
        for (const file of files) {
          if (!file.type.startsWith('image/')) continue;
          if (nextSlot > 24) break;
          const slot = nextSlot++;
          const reader = new FileReader();
          reader.onload = async () => {
            try {
              const { url } = await api('/upload', { method: 'POST', body: { key: String(slot), dataUrl: reader.result } });
              setSlotPreview(slot, url);
            } catch (err) {
              alert('업로드 실패: ' + (err.data && err.data.error || err.message));
            }
          };
          reader.readAsDataURL(file);
        }
      };
      document.querySelectorAll('#galleryThumbs .gallery-thumb input[type="file"]').forEach(fileInput => {
        fileInput.onchange = async () => {
          const file = fileInput.files && fileInput.files[0];
          if (!file) return;
          const slot = fileInput.getAttribute('data-slot');
          const reader = new FileReader();
          reader.onload = async () => {
            try {
              const { url } = await api('/upload', { method: 'POST', body: { key: String(slot), dataUrl: reader.result } });
              setSlotPreview(Number(slot), url);
            } catch (err) {
              alert('업로드 실패: ' + (err.data && err.data.error || err.message));
            }
          };
          reader.readAsDataURL(file);
          fileInput.value = '';
        };
      });
    }

    document.getElementById('saveBtn').addEventListener('click', async () => {
      const data = { meta: {}, home: {}, about: {} };
      document.querySelectorAll('#adminView [data-key]').forEach(el => {
        const key = el.getAttribute('data-key');
        if (!key || el.type === 'file') return;
        const val = (el.tagName === 'TEXTAREA' ? el.value : el.value).trim();
        setByKey(data, key, val);
      });
      try {
        await api('/content', { method: 'POST', body: data });
        const statusEl = document.getElementById('adminStatus');
        statusEl.textContent = '저장되었습니다.';
        statusEl.className = 'admin-status success';
        statusEl.style.color = '';
      } catch (e) {
        if (e.status === 401) {
          setToken(null);
          document.getElementById('adminView').style.display = 'none';
          document.getElementById('loginView').style.display = 'block';
          document.getElementById('loginError').textContent = '세션이 만료되었습니다. 다시 로그인하세요.';
          document.getElementById('loginError').style.display = 'block';
          return;
        }
        const statusEl = document.getElementById('adminStatus');
        statusEl.textContent = '저장 실패: ' + (e.data && e.data.error || e.message);
        statusEl.className = 'admin-status error';
      }
    });

    if (getToken()) {
      document.getElementById('loginView').style.display = 'none';
      document.getElementById('adminView').style.display = 'block';
      loadContent();
    }
  </script>
</body>
</html>
